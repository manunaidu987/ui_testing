name: Cucumber UI Tests
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:
  repository_dispatch:        # 👈 Added
    types: [run-ui-tests]     # 👈 Added

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: manunaidu987/ui_testing

    - name: Checkout Target Application
      uses: actions/checkout@v4
      with:
        repository: SuperAlignHQ/log_optimization_dashboard
        token: ${{ secrets.UI_TEST_TOKEN || github.token }}
        path: log_optimization_dashboard
        submodules: false

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Start Backend and Frontend
      run: |
        cd log_optimization_dashboard
        pip install -r requirements.txt
        python -m backend.app.seed
        uvicorn backend.app.main:app --reload --host 0.0.0.0 --port 8000 &
        cd frontend
        npm ci
        npm start &
        npx wait-on http://localhost:3000

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Cucumber Tests
      run: xvfb-run --auto-servernum -- npm test

    - name: Generate HTML Report
      run: npm run report
      if: always()

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cucumber-test-report
        path: |
          reports/
          cucumber*.json
          cucumber*.html
        retention-days: 14