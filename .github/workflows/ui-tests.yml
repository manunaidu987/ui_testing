name: Cucumber UI Tests
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:
  repository_dispatch:        # 👈 Added
    types: [run-ui-tests]     # 👈 Added

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: manunaidu987/uitesting
        uses: actions/checkout@v4
      - name: Checkout Target Application
        uses: actions/checkout@v4
        with:
          repository: SuperAlignHQ/log_optimization_dashboard
          token: ${{ secrets.UI_TEST_TOKEN || github.token }}
          path: log_optimization_dashboard
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Target App dependencies & Start
        run: |
          cd log_optimization_dashboard/frontend
          npm ci
          npm start &
          npx wait-on http://localhost:3000/
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Cucumber Tests
        run: xvfb-run --auto-servernum -- npm test
      - name: Generate HTML Report
        run: npm run report
        if: always()
      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-test-report
          path: |
            reports/
            cucumber.json
            cucumber.html
          retention-days: 14