name: Run UI Tests On Dispatch
on:
  repository_dispatch:
    types: [run-ui-tests]
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Inject Remote Repository Branch
        uses: actions/checkout@v4
        with:
          repository: manunaidu987/ui_testing
          ref: ${{ github.event.client_payload.ref || 'main' }}
          
      - name: Checkout Target Application
        uses: actions/checkout@v4
        with:
          repository: SuperAlignHQ/log_optimization_dashboard
          token: ${{ secrets.UI_TEST_TOKEN }}
          path: log_optimization_dashboard
          ref: ${{ github.event.client_payload.sha || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Target App dependencies & Start
        run: |
          cd log_optimization_dashboard/frontend
          npm ci
          npm start &
          npx wait-on http://localhost:3000

      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright environments
        run: npx playwright install --with-deps
        
      - name: Run E2E tests headless securely
        run: xvfb-run --auto-servernum -- npx cucumber-js
        
      - name: Send status back to dashboard
        if: always()
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.UI_TEST_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/manunaidu987/log_optimization_dashboard/statuses/${{ github.event.client_payload.sha }} \
            -d '{"state":"${{ job.status }}","context":"UI Automation Target", "description":"${{ job.status }}","target_url":"https://github.com/'${{ github.repository }}'/actions/runs/'${{ github.run_id }}'"}'
